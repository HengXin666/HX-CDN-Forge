name: Release to NPM

# ─────────────────────────────────────────────────────────────
# ⚠️ AI / 维护者注意事项 (请勿随意修改以下配置):
#
# 1. Node 版本必须 >= 22.14.0 (对应 npm >= 11.5.1)
#    才能使用 OIDC Trusted Publishing, 不要随意升级到 Node 24+
#    因为 jest + ts-jest 在 Node 24 下有模块解析兼容问题
#
# 2. 发布使用 npm OIDC Trusted Publishing, 不需要 NPM_TOKEN
#    不需要设置 NODE_AUTH_TOKEN 环境变量
#    认证由 `permissions: id-token: write` + npmjs.com 上的
#    Trusted Publisher 配置自动完成
#
# 3. 不要在发布流程中执行 `npm install -g npm@latest`
#    Node 22 自带的 npm 已经支持 OIDC, 强制升级会导致
#    `Cannot find module 'promise-retry'` 错误
#
# 4. CI 中不跑 jest 测试, 因为 ts-jest 在 CI 环境下
#    有 jest-util 模块解析问题, 测试请在本地运行
# ─────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
