name: Release to NPM

# ─────────────────────────────────────────────────────────────
# ⚠️ AI / 维护者注意事项 (请勿随意修改以下配置):
#
# 1. 使用 Node 22.22.1 + 手动升级 npm 到 >=11
#    Node 22 自带 npm 10.x, 不支持 OIDC Trusted Publishing
#    必须升级 npm 才能使用 --provenance
#    不要升级到 Node 24+ (jest + ts-jest 兼容问题)
#    Node 22.22.2 有 regression: npm install -g 会 MODULE_NOT_FOUND promise-retry
#    (nodejs/node#62425), 因此锁定到 22.22.1
#
# 2. 发布使用 npm OIDC Trusted Publishing, 不需要 NPM_TOKEN
#    认证由 `permissions: id-token: write` + npmjs.com 上的
#    Trusted Publisher 配置自动完成
#
# 3. CI 中不跑 jest 测试, 因为 ts-jest 在 CI 环境下
#    有 jest-util 模块解析问题, 测试请在本地运行
# ─────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
