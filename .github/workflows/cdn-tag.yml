name: CDN Tag Manager

# 当推送到 main 分支时触发 (即数据提交后)
on:
  push:
    branches: [main]
    # 可选: 仅当特定路径变化时触发
    # paths:
    #   - 'static/**'

permissions:
  contents: write

jobs:
  create-cdn-tag:
    name: Create CDN Tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史以管理 tags

      - name: Create and manage CDN tags
        run: |
          # 获取当前 commit 短 hash
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          NEW_TAG="bot-${SHORT_SHA}-${TIMESTAMP}"

          echo "📌 Creating new tag: ${NEW_TAG}"

          # 创建新 tag
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"

          echo "✅ Tag created: ${NEW_TAG}"

          # 获取所有 bot- 开头的 tags，按时间排序
          BOT_TAGS=$(git tag -l 'bot-*' --sort=-creatordate)
          TAG_COUNT=$(echo "${BOT_TAGS}" | grep -c '^bot-' || true)

          echo "📋 Current bot tags (${TAG_COUNT} total):"
          echo "${BOT_TAGS}"

          # 只保留最新 2 个，删除旧的
          if [ "${TAG_COUNT}" -gt 2 ]; then
            TAGS_TO_DELETE=$(echo "${BOT_TAGS}" | tail -n +3)
            echo ""
            echo "🗑️ Deleting old tags:"

            while IFS= read -r tag; do
              if [ -n "${tag}" ]; then
                echo "  Deleting: ${tag}"
                git push origin --delete "${tag}" 2>/dev/null || true
                git tag -d "${tag}" 2>/dev/null || true
              fi
            done <<< "${TAGS_TO_DELETE}"
          fi

          echo ""
          echo "🎉 Done! Latest CDN tag: ${NEW_TAG}"
          echo ""
          echo "Use in your code:"
          echo "  createForgeConfig({ user: '...', repo: '...', ref: '${NEW_TAG}' })"

      - name: Summary
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "## CDN Tag Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`bot-${SHORT_SHA}-${TIMESTAMP}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${GITHUB_SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Active tags:" >> $GITHUB_STEP_SUMMARY
          git tag -l 'bot-*' --sort=-creatordate | head -2 | while read tag; do
            echo "- \`${tag}\`" >> $GITHUB_STEP_SUMMARY
          done
